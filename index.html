<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KGS Product Alpha 2.0</title>
<style>
:root{--bg:#f3f6fb;--p:#fff;--t:#172033;--m:#6c7587;--l:#e5eaf2;--b:#173f72;--g:#178451;--r:#c63f4d}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--t)}button,input,select{font:inherit}header{position:sticky;top:0;z-index:5;height:70px;padding:0 max(18px,calc((100vw - 1220px)/2));display:flex;align-items:center;justify-content:space-between;background:var(--p);border-bottom:1px solid var(--l)}.brand{font-weight:900;color:var(--b);font-size:22px}.badge{background:#e8f1fb;color:#245d97;padding:7px 11px;border-radius:99px;font-size:12px;font-weight:800}main{max-width:1220px;margin:auto;padding:36px 18px 70px}.hero{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;margin-bottom:20px}.hero h1{font-size:clamp(34px,5vw,56px);line-height:1.08;margin:8px 0}.muted{color:var(--m)}.card{background:var(--p);border:1px solid var(--l);border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(31,54,85,.08)}.status{display:flex;flex-direction:column;justify-content:center}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}.metric strong{font-size:22px}.bar{height:8px;background:var(--l);border-radius:99px;margin-top:12px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#173f72,#2f6fb0)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px}.maincol{display:grid;gap:18px}.sticky{position:sticky;top:88px}h2{margin:0 0 14px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.btn{border:1px solid var(--l);background:var(--p);padding:9px 12px;border-radius:10px;cursor:pointer}.coursegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.course{border:1px solid var(--l);border-radius:14px;padding:14px;cursor:pointer}.course.sel{border-color:#2f6fb0;box-shadow:0 0 0 3px rgba(47,111,176,.12)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.chip{font-size:11px;background:var(--bg);padding:5px 8px;border-radius:99px;color:var(--m)}.filters{display:flex;gap:8px}.filters input,.filters select,.alloc{border:1px solid var(--l);background:var(--p);padding:9px 10px;border-radius:9px}.notice{background:#eef5fd;border:1px solid #d8e7f7;color:#27567f;padding:11px 13px;border-radius:11px;margin:12px 0}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:11px 9px;border-bottom:1px solid var(--l);text-align:left;font-size:13px}th{color:var(--m)}.ok{color:var(--g);font-weight:800}.bad{color:var(--r);font-weight:800}.row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--l)}.suggest{background:#f7f9fc;border:1px solid var(--l);padding:13px;border-radius:12px;line-height:1.6}@media(max-width:980px){.hero,.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(3,1fr)}.sticky{position:static}}@media(max-width:620px){.metrics{grid-template-columns:1fr 1fr}.coursegrid{grid-template-columns:1fr}.filters{display:grid}}
</style></head><body>
<header><div><div class="brand">KGS</div><div class="muted" style="font-size:12px">Graduation Audit Manager</div></div><span class="badge">Product Alpha 2.0</span></header>
<main>
<section class="hero"><div><div style="font-size:12px;color:#2f6fb0;font-weight:900">어진님 졸업사정 베타</div><h1>시간표보다 먼저,<br>졸업요건을 정확하게.</h1><p class="muted">총학점, 본전공 42, 복수전공 42, 전필 5과목, 지정 전선 8과목을 각각 계산합니다.</p></div><div id="status" class="card status"></div></section>
<section id="metrics" class="metrics"></section>
<section class="layout"><div class="maincol">
<div class="card"><div class="head"><div><div class="muted" style="font-size:12px">수강계획 시뮬레이션</div><h2>2026-2 개설과목</h2></div><button id="resetPlan" class="btn">계획 초기화</button></div><div id="offerings" class="coursegrid"></div></div>
<div class="card"><div class="head"><div><div class="muted" style="font-size:12px">과목 배정 관리</div><h2>이수·예정 과목 사용처</h2></div><div class="filters"><input id="search" placeholder="과목 검색"><select id="filter"><option value="all">전체</option><option value="completed">이수</option><option value="planned">수강 예정</option><option value="major">본전공 배정</option><option value="dual">복수전공 배정</option><option value="required">경정 전필</option><option value="e8">지정 전선</option></select></div></div><div class="notice">배정처를 바꾸면 본전공·복수전공 학점과 전선 8과목 수가 즉시 다시 계산됩니다.</div><div class="tablewrap"><table><thead><tr><th>과목명</th><th>상태</th><th>학점</th><th>가능</th><th>현재 배정</th><th>전필</th><th>전선8</th><th>근거</th></tr></thead><tbody id="body"></tbody></table></div></div>
</div><aside><div class="card sticky"><h2>현재 부족 조건</h2><div id="deficits"></div><hr><h2>경영정보 전필 5과목</h2><div id="required"></div><hr><h2>자동 제안</h2><div id="suggestion" class="suggest"></div></div></aside></section>
</main>
<script>
const COURSES=[{"id": "cf024", "name": "프로그래밍기초", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf015", "name": "경영의사결정론", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf702", "name": "정보통신시스템", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf753", "name": "인공지능", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "dd015", "name": "객체지향프로그래밍", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf765", "name": "경영정보학개론", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf766", "name": "정보기술론", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf739", "name": "e비즈니스개론", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": false, "required": false, "e8": false}, {"id": "cf737", "name": "경영정보시스템", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": true, "required": false, "e8": false}, {"id": "dbm", "name": "데이터베이스관리", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": true, "required": true, "e8": true, "note": "성적표의 데이터베이스시스템을 인정과목으로 반영"}, {"id": "ec751", "name": "시스템분석및설계", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": true, "required": true, "e8": true}, {"id": "cf021", "name": "정보시스템전략분석", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": true, "required": true, "e8": true}, {"id": "cf741", "name": "e비즈니스시스템", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": true, "required": true, "e8": true}, {"id": "ec727", "name": "실험계획법응용", "credits": 3, "completed": true, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": false}, {"id": "ec013", "name": "원가및재무공학", "credits": 3, "completed": true, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": false}, {"id": "ec301", "name": "생산통제", "credits": 3, "completed": true, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true}, {"id": "ec717", "name": "작업분석및설계", "credits": 3, "completed": true, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true}, {"id": "ec736", "name": "프로그래밍응용", "credits": 3, "completed": true, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true}, {"id": "ec011", "name": "공학통계1", "credits": 3, "completed": true, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true}, {"id": "ek002", "name": "IT기반혁신방법론", "credits": 3, "completed": true, "alloc": "dual", "major": true, "dual": true, "required": false, "e8": false}, {"id": "cs716", "name": "e-마케팅", "credits": 3, "completed": true, "alloc": "major", "major": true, "dual": true, "required": false, "e8": false}, {"id": "as704", "name": "정보시스템관리론", "credits": 3, "completed": false, "alloc": "major", "major": true, "dual": true, "required": true, "e8": true, "offered": true, "times": ["목 6~8"]}, {"id": "ec709", "name": "생산계획", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["월 6~8", "화 6~8"]}, {"id": "ec747", "name": "통계적품질관리", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["화 1~3", "수 6~8"]}, {"id": "ec721", "name": "경영과학1및실습", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["월 1~4", "목 1~4"]}, {"id": "ec744", "name": "시뮬레이션및실습", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["화 1~4"]}, {"id": "ec728", "name": "의사결정분석", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["수 6~8"]}, {"id": "ec315", "name": "신뢰성공학", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["화 6~8"]}, {"id": "ec765", "name": "SCM", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": true, "offered": true, "times": ["수 1~3"]}, {"id": "ec012", "name": "공학통계2", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": false, "offered": true, "times": ["금 1~3", "금 6~8"]}, {"id": "ec741", "name": "물류경영", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": false, "offered": true, "times": ["월 1~3"]}, {"id": "ec755", "name": "기술경영론(캡스톤디자인)", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": false, "offered": true, "times": ["금 6~8"]}, {"id": "ec768", "name": "스마트제조및정보시스템", "credits": 3, "completed": false, "alloc": "dual", "major": false, "dual": true, "required": false, "e8": false, "offered": true, "times": ["수 1~3"]}];
const RULES={total:130,major:42,dual:42,required:5,e8:8,baseTotal:121};
const state={planned:new Set(JSON.parse(localStorage.getItem('p')||'[]')),alloc:JSON.parse(localStorage.getItem('a')||'{}')};
COURSES.forEach(c=>{if(!state.alloc[c.id])state.alloc[c.id]=c.alloc});
const $=s=>document.querySelector(s), active=c=>c.completed||state.planned.has(c.id), al=c=>state.alloc[c.id]||'none';
function totals(){const ac=COURSES.filter(active),planned=[...state.planned].map(id=>COURSES.find(c=>c.id===id)).filter(Boolean);return{total:RULES.baseTotal+planned.reduce((s,c)=>s+c.credits,0),major:ac.filter(c=>al(c)==='major'&&c.major).reduce((s,c)=>s+c.credits,0),dual:ac.filter(c=>al(c)==='dual'&&c.dual).reduce((s,c)=>s+c.credits,0),required:COURSES.filter(c=>c.required&&active(c)&&al(c)==='major').length,e8:ac.filter(c=>c.e8&&al(c)==='dual').length}}
function metric(n,v,t){return `<div class="card metric"><div style="display:flex;justify-content:space-between"><span>${n}</span><strong>${v} / ${t}</strong></div><div class="bar"><i style="width:${Math.min(100,Math.round(v/t*100))}%"></i></div></div>`}
function deficits(t){return [['총 졸업학점',t.total,RULES.total,'학점'],['경영정보 본전공',t.major,RULES.major,'학점'],['산업시스템 복수전공',t.dual,RULES.dual,'학점'],['경영정보 전필',t.required,RULES.required,'과목'],['산업시스템 지정 전선',t.e8,RULES.e8,'과목']].map(x=>({label:x[0],cur:x[1],tar:x[2],unit:x[3],short:Math.max(0,x[2]-x[1])}))}
function renderTop(){const t=totals(),d=deficits(t);$('#metrics').innerHTML=[metric('총 취득학점',t.total,130),metric('경영정보 본전공',t.major,42),metric('산업시스템 복수전공',t.dual,42),metric('경영정보 전필',t.required,5),metric('지정 전선',t.e8,8)].join('');const miss=d.filter(x=>x.short);$('#status').innerHTML=`<div class="muted" style="font-size:12px">현재 최종 판정</div><div style="font-size:28px;font-weight:900;margin:7px 0">${miss.length?'졸업요건 미충족':'졸업요건 충족'}</div>${miss.length?'<ul class="muted">'+miss.map(x=>`<li>${x.label} ${x.short}${x.unit} 부족</li>`).join('')+'</ul>':'<div class="ok">모든 조건 충족</div>'}`;$('#deficits').innerHTML=d.map(x=>`<div class="row"><span>${x.label}</span><strong class="${x.short?'bad':'ok'}">${x.short?x.short+x.unit+' 부족':'충족'}</strong></div>`).join('')}
function renderOfferings(){const list=COURSES.filter(c=>c.offered&&!c.completed);$('#offerings').innerHTML=list.map(c=>`<div class="course ${state.planned.has(c.id)?'sel':''}" data-id="${c.id}"><b>${c.name}</b><div class="muted" style="font-size:12px;margin-top:4px">${c.credits}학점 · ${(c.times||[]).join(' / ')}</div><div class="chips">${c.required?'<span class="chip">경정 전필</span>':''}${c.dual?'<span class="chip">복수전공</span>':''}${c.e8?'<span class="chip">전선8</span>':''}</div></div>`).join('');document.querySelectorAll('.course').forEach(e=>e.onclick=()=>{const id=e.dataset.id;state.planned.has(id)?state.planned.delete(id):state.planned.add(id);save();render()})}
function options(c){let o=['<option value="none">미배정</option>'];if(c.major)o.push(`<option value="major" ${al(c)==='major'?'selected':''}>본전공</option>`);if(c.dual)o.push(`<option value="dual" ${al(c)==='dual'?'selected':''}>복수전공</option>`);return o.join('')}
function reason(c){if(!active(c))return '미이수';if(c.required&&al(c)==='major')return '경영정보 전필 산입';if(c.required&&al(c)!=='major')return '전필 미충족 위험';if(c.e8&&al(c)==='dual')return '복전 학점 + 전선8 산입';if(c.dual&&al(c)==='dual')return '복수전공 학점 산입';if(c.major&&al(c)==='major')return '본전공 학점 산입';return '현재 미산입'}
function renderTable(){let q=$('#search').value.toLowerCase(),f=$('#filter').value;let rows=COURSES.filter(c=>c.name.toLowerCase().includes(q)).filter(c=>({all:true,completed:c.completed,planned:state.planned.has(c.id),major:al(c)==='major',dual:al(c)==='dual',required:c.required,e8:c.e8}[f]));$('#body').innerHTML=rows.map(c=>`<tr><td><b>${c.name}</b>${c.note?'<div class="muted" style="font-size:11px">'+c.note+'</div>':''}</td><td>${c.completed?'<span class="ok">이수</span>':state.planned.has(c.id)?'<span style="color:#2f6fb0;font-weight:800">수강 예정</span>':'<span class="bad">미이수</span>'}</td><td>${c.credits}</td><td>${[c.major?'본전공':null,c.dual?'복수전공':null].filter(Boolean).join('·')||'-'}</td><td><select class="alloc" data-id="${c.id}" ${!active(c)?'disabled':''}>${options(c)}</select></td><td>${c.required?'필수':'-'}</td><td>${c.e8?'인정':'-'}</td><td>${reason(c)}</td></tr>`).join('');document.querySelectorAll('.alloc').forEach(s=>s.onchange=()=>{state.alloc[s.dataset.id]=s.value;save();render()})}
function renderSide(){const req=COURSES.filter(c=>c.required);$('#required').innerHTML=req.map(c=>{const ok=active(c)&&al(c)==='major';return `<div class="row"><span>${c.name}</span><strong class="${ok?'ok':'bad'}">${ok?(state.planned.has(c.id)?'수강 예정':'충족'):'미충족'}</strong></div>`}).join('');const t=totals(),lines=[];const mr=req.filter(c=>!(active(c)&&al(c)==='major'));if(mr.length)lines.push('<b>필수:</b> '+mr.map(c=>c.name).join(', '));let need=Math.max(Math.ceil(Math.max(0,42-t.dual)/3),Math.max(0,8-t.e8));if(need>0){const cand=COURSES.filter(c=>c.offered&&!c.completed&&!state.planned.has(c.id)&&c.dual).sort((a,b)=>b.e8-a.e8).slice(0,need);if(cand.length)lines.push('<b>복수전공 보완 후보:</b> '+cand.map(c=>c.name).join(', '))}$('#suggestion').innerHTML=lines.length?lines.join('<br><br>'):'현재 계획 기준 추가 보완 없음.'}
function save(){localStorage.setItem('p',JSON.stringify([...state.planned]));localStorage.setItem('a',JSON.stringify(state.alloc))}
function render(){renderTop();renderOfferings();renderTable();renderSide()}
$('#search').oninput=renderTable;$('#filter').onchange=renderTable;$('#resetPlan').onclick=()=>{state.planned.clear();save();render()};render();
</script></body></html>
